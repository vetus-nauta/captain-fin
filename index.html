<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#f7f8fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Captain Fin">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <link rel="stylesheet" href="assets/app.css?v=2026.05.20-captain-fin-010">
  <title>Captain Fin</title>
</head>
<body>
  <div class="guest-screen" id="guestScreen">
    <div class="guest-card">
      <div class="app-icon">€</div>
      <h1>Captain Fin</h1>
      <p>Частные финансовые заметки капитана. Доступ только через админку BRKOVIC.</p>
      <form id="loginForm" class="login-form">
        <input id="loginEmail" type="email" autocomplete="username" placeholder="Email">
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Пароль">
        <button type="submit">Войти</button>
      </form>
      <div class="status" id="loginStatus"></div>
    </div>
  </div>

  <div class="app-shell hidden mobile-editor" id="appShell">
    <aside class="sidebar">
      <header class="side-head">
        <div>
          <h1>Заметки</h1>
          <span id="versionBadge">Captain Fin</span>
        </div>
        <button class="icon-button" id="newReport" title="Новый отчет">+</button>
      </header>
      <div class="side-actions">
        <button class="soft" id="shareWebApp">Поделиться web app</button>
        <button class="soft" id="syncLocal">Экспорт для локальной версии</button>
        <button class="soft" id="summaryOpen">Сводка сданных</button>
        <button class="soft" id="archiveOpen">Архив удаленных</button>
        <button class="soft" id="storageInfo">Пути хранения</button>
      </div>
      <div class="summary-box hidden" id="summaryBox">
        <div class="summary-dates">
          <input type="date" id="summaryFrom">
          <input type="date" id="summaryTo">
        </div>
        <button id="summaryRun" type="button">Показать</button>
        <div class="summary-result" id="summaryResult"></div>
      </div>
      <input class="search" id="search" placeholder="Поиск">
      <div class="report-list" id="reportList"></div>
    </aside>

    <main class="notebook">
      <header class="editor-head">
        <button class="soft mobile-back" id="backToList" type="button">Назад</button>
        <strong id="editorTitle">Новая запись</strong>
        <span id="saveState">Сохранено</span>
      </header>
      <section class="note-card">
        <div class="note-top">
          <input type="date" id="reportDate">
          <label class="done-toggle">
            <input type="checkbox" id="submitted">
            Сдал
          </label>
        </div>
        <textarea id="notes" class="notes" placeholder="Начните с заметок текущего отчета..."></textarea>
        <div class="balance-row">
          <label>Остаток на дату
            <input type="number" step="0.01" id="openingBalance" placeholder="0.00">
          </label>
          <button class="soft" id="importSigned">Разобрать + / -</button>
        </div>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="entries-panel">
        <div class="panel-head">
          <h2>Строки отчета</h2>
          <div>
            <button class="soft" data-add="income">+ Приход</button>
            <button class="soft" data-add="expense">+ Расход</button>
            <button class="soft" data-add="upcoming">+ Будущий</button>
          </div>
        </div>
        <div class="entries" id="entries"></div>
      </section>

      <section class="attachments-panel">
        <div class="panel-head">
          <h2>Вложения</h2>
          <label class="file-button">
            Добавить файл
            <input type="file" id="attachmentInput">
          </label>
        </div>
        <div class="attachments-list" id="attachmentsList"></div>
      </section>

      <section class="actions">
        <button id="saveReport">Сохранить</button>
        <button class="soft" id="exportExcel">Excel</button>
        <button class="danger" id="deleteReport">Удалить</button>
      </section>
      <div class="status" id="status"></div>
    </main>
  </div>
  <div class="share-sheet hidden" id="shareSheet" aria-hidden="true">
    <div class="share-backdrop" id="closeShareBackdrop"></div>
    <section class="share-panel" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
      <div class="share-head">
        <div>
          <h2 id="shareTitle">Поделиться Captain Fin</h2>
          <p id="shareUrlText">https://brkovic.ltd/captain-fin/</p>
        </div>
        <button class="soft" id="closeShare" type="button">Закрыть</button>
      </div>
      <div class="share-grid">
        <button class="share-choice" id="shareMail" type="button"><span>@</span>Mail</button>
        <button class="share-choice" id="shareWhatsApp" type="button"><span>WA</span>WhatsApp</button>
        <button class="share-choice" id="shareTelegram" type="button"><span>TG</span>Telegram</button>
        <button class="share-choice" id="shareDrive" type="button"><span>GD</span>Google Drive</button>
        <button class="share-choice wide" id="copyPublicLink" type="button"><span>↗</span>Скопировать реальную ссылку</button>
      </div>
    </section>
  </div>
  <script src="assets/app.js?v=2026.05.20-captain-fin-010"></script>
</body>
</html>
